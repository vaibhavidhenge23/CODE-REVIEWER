<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeReview AI — by Vaibhavi Dhenge</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #07070d;
  --surface: #0e0e18;
  --border: #1c1c2e;
  --accent: #7c6af7;
  --accent2: #4ade80;
  --text: #e2e8f0;
  --muted: #4a5068;
  --critical: #ef4444;
  --warning: #f59e0b;
  --suggestion: #3b82f6;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(124,106,247,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,106,247,0.025) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}
header {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  background: rgba(7,7,13,0.9);
  backdrop-filter: blur(10px);
}
.logo { display:flex; align-items:center; gap:10px; }
.logo-icon {
  width:30px; height:30px;
  background:var(--accent);
  border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:15px;
}
.logo h1 { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; letter-spacing:-0.5px; }
.logo h1 span { color:var(--accent); }
.author { margin-left:auto; font-size:10px; color:var(--muted); letter-spacing:0.5px; }
.author strong { color:var(--accent2); }

.workspace {
  display:grid;
  grid-template-columns: 240px 1fr 1fr;
  flex:1;
  overflow:hidden;
  position:relative;
  z-index:1;
}

/* SIDEBAR */
.sidebar {
  border-right:1px solid var(--border);
  background:var(--surface);
  display:flex;
  flex-direction:column;
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border); }
.sidebar-section { padding:14px 14px; border-bottom:1px solid var(--border); }
.sidebar-label { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:10px; }

.lang-grid { display:grid; grid-template-columns:1fr 1fr; gap:5px; }
.lang-btn {
  background:transparent; border:1px solid var(--border);
  color:var(--muted); padding:7px 6px; border-radius:6px;
  font-family:'JetBrains Mono',monospace; font-size:10px;
  cursor:pointer; transition:all 0.15s; text-align:center;
}
.lang-btn:hover { border-color:var(--accent); color:var(--accent); }
.lang-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(124,106,247,0.1); }

.agent-list { display:flex; flex-direction:column; gap:5px; }
.agent-btn {
  background:transparent; border:1px solid var(--border);
  color:var(--muted); padding:9px 10px; border-radius:7px;
  font-family:'JetBrains Mono',monospace; font-size:10px;
  cursor:pointer; transition:all 0.15s; text-align:left;
  display:flex; align-items:center; gap:7px;
}
.agent-btn:hover { border-color:var(--accent); color:var(--text); }
.agent-btn.active { border-color:var(--accent); background:rgba(124,106,247,0.08); color:var(--text); }
.agent-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.agent-name { font-weight:500; font-size:10px; }
.agent-tag { margin-left:auto; font-size:9px; padding:2px 5px; border-radius:3px; background:rgba(124,106,247,0.15); color:var(--accent); }
.agent-tag.soon { background:rgba(74,80,104,0.3); color:var(--muted); }

.upload-zone {
  border:1px dashed var(--border); border-radius:8px;
  padding:14px; text-align:center; cursor:pointer;
  transition:all 0.2s; position:relative;
}
.upload-zone:hover, .upload-zone.dragover { border-color:var(--accent); background:rgba(124,106,247,0.05); }
.upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.upload-icon { font-size:18px; margin-bottom:5px; }
.upload-text { font-size:9px; color:var(--muted); line-height:1.6; }
.upload-text strong { color:var(--accent); }
.file-name { font-size:9px; color:var(--accent2); margin-top:5px; word-break:break-all; }

/* EDITOR */
.editor-panel { border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
.panel-header {
  padding:10px 14px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:7px;
  background:rgba(255,255,255,0.015); flex-shrink:0;
}
.dots { display:flex; gap:5px; }
.dot { width:8px; height:8px; border-radius:50%; }
.dot-r { background:#ef4444; } .dot-y { background:#f59e0b; } .dot-g { background:#4ade80; }
.panel-title { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-left:3px; }

textarea {
  flex:1; background:transparent; border:none;
  color:var(--text); font-family:'JetBrains Mono',monospace;
  font-size:13px; line-height:1.75; padding:20px;
  resize:none; outline:none; width:100%;
}
textarea::placeholder { color:var(--muted); }

.editor-footer {
  padding:10px 14px; border-top:1px solid var(--border);
  display:flex; gap:8px; align-items:center; flex-shrink:0;
  background:var(--surface);
}
.char-count { font-size:9px; color:var(--muted); margin-right:auto; }
.btn-clear {
  background:transparent; border:1px solid var(--border);
  color:var(--muted); padding:7px 12px; border-radius:6px;
  font-family:'JetBrains Mono',monospace; font-size:10px; cursor:pointer; transition:all 0.15s;
}
.btn-clear:hover { border-color:var(--critical); color:var(--critical); }
.btn-review {
  background:var(--accent); border:none; color:white;
  padding:8px 18px; border-radius:6px;
  font-family:'Syne',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:5px;
}
.btn-review:hover { background:#6b5ce7; transform:translateY(-1px); }
.btn-review:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

/* OUTPUT */
.output-panel { display:flex; flex-direction:column; overflow:hidden; }
.output-body { flex:1; overflow-y:auto; padding:18px; }
.output-body::-webkit-scrollbar { width:3px; }
.output-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.placeholder {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:10px; color:var(--muted); text-align:center;
}
.placeholder .icon { font-size:34px; opacity:0.2; }
.placeholder p { font-size:10px; line-height:1.7; }

.loading {
  height:100%; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:14px;
}
.spinner {
  width:26px; height:26px;
  border:2px solid var(--border); border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading p { font-size:10px; color:var(--muted); animation:pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

.results { display:flex; flex-direction:column; gap:12px; animation:fadeUp 0.3s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

.score-block {
  background:rgba(124,106,247,0.07); border:1px solid rgba(124,106,247,0.18);
  border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:14px;
}
.score-num { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; color:var(--accent); line-height:1; flex-shrink:0; }
.score-sub { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.score-summary { font-size:11px; color:var(--text); line-height:1.6; opacity:0.8; }

.section-label { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:6px; }

.issue-card {
  border-radius:7px; padding:11px 13px;
  border-left:3px solid transparent;
  background:rgba(0,0,0,0.25); margin-bottom:7px;
}
.issue-card.critical { border-color:var(--critical); }
.issue-card.warning { border-color:var(--warning); }
.issue-card.suggestion { border-color:var(--suggestion); }
.issue-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.sev-tag { font-size:9px; padding:2px 7px; border-radius:4px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600; }
.sev-tag.critical { background:rgba(239,68,68,0.15); color:var(--critical); }
.sev-tag.warning { background:rgba(245,158,11,0.15); color:var(--warning); }
.sev-tag.suggestion { background:rgba(59,130,246,0.15); color:var(--suggestion); }
.line-ref { font-size:9px; color:var(--muted); }
.issue-text { font-size:11px; line-height:1.5; margin-bottom:5px; }
.divider { height:1px; background:var(--border); margin:7px 0; }
.why-text { font-size:10px; color:#a78bfa; line-height:1.5; margin-bottom:3px; }
.quick-fix { font-size:10px; color:var(--warning); line-height:1.5; margin-bottom:3px; }
.best-fix { font-size:10px; color:var(--accent2); line-height:1.5; }
.fix-label { font-weight:600; }

.code-block-wrap { position:relative; }
.copy-btn {
  position:absolute; top:8px; right:8px;
  background:var(--border); border:none; color:var(--muted);
  padding:3px 9px; border-radius:4px;
  font-family:'JetBrains Mono',monospace; font-size:9px;
  cursor:pointer; transition:all 0.15s;
}
.copy-btn:hover { background:var(--accent); color:white; }
.code-block {
  background:rgba(0,0,0,0.4); border:1px solid var(--border);
  border-radius:8px; padding:14px; font-size:11px;
  line-height:1.7; overflow-x:auto; white-space:pre-wrap; word-break:break-word;
}
.error-block {
  background:rgba(239,68,68,0.07); border:1px solid rgba(239,68,68,0.2);
  border-radius:8px; padding:14px; font-size:11px;
  color:var(--critical); line-height:1.6;
}
.hidden { display:none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <h1>Code<span>Review</span> AI</h1>
  </div>
  <div class="author">by <strong>Vaibhavi Dhenge</strong></div>
</header>

<div class="workspace">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Language</div>
      <div class="lang-grid" id="langGrid">
        <button class="lang-btn active" data-lang="python">Python</button>
        <button class="lang-btn" data-lang="javascript">JavaScript</button>
        <button class="lang-btn" data-lang="typescript">TypeScript</button>
        <button class="lang-btn" data-lang="java">Java</button>
        <button class="lang-btn" data-lang="go">Go</button>
        <button class="lang-btn" data-lang="cpp">C++</button>
        <button class="lang-btn" data-lang="rust">Rust</button>
        <button class="lang-btn" data-lang="php">PHP</button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">AI Agent</div>
      <div class="agent-list">
        <button class="agent-btn active" data-agent="gemini" onclick="selectAgent(this)">
          <div class="agent-dot" style="background:#4ade80"></div>
          <div class="agent-name">Gemini Flash</div>
          <span class="agent-tag">Active</span>
        </button>
        <button class="agent-btn" data-agent="gpt4" onclick="selectAgent(this)">
          <div class="agent-dot" style="background:#74a4f7"></div>
          <div class="agent-name">GPT-4o</div>
          <span class="agent-tag soon">Soon</span>
        </button>
        <button class="agent-btn" data-agent="claude" onclick="selectAgent(this)">
          <div class="agent-dot" style="background:#f97316"></div>
          <div class="agent-name">Claude</div>
          <span class="agent-tag soon">Soon</span>
        </button>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Upload File</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".py,.js,.ts,.java,.go,.cpp,.c,.rs,.php,.txt" onchange="handleFile(event)">
        <div class="upload-icon">📁</div>
        <div class="upload-text"><strong>Click or drag</strong> to upload<br>.py .js .ts .java .go .cpp</div>
        <div class="file-name hidden" id="fileName"></div>
      </div>
    </div>
  </div>

  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="panel-header">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="panel-title" id="editorTitle">editor.py</span>
    </div>
    <textarea id="codeInput" placeholder="// Paste your code here...&#10;// or upload a file from the sidebar" oninput="updateCount()"></textarea>
    <div class="editor-footer">
      <span class="char-count" id="charCount">0 chars</span>
      <button class="btn-clear" onclick="clearCode()">Clear</button>
      <button class="btn-review" id="reviewBtn" onclick="reviewCode()">⚡ Review</button>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel">
    <div class="panel-header">
      <div class="dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <span class="panel-title">output</span>
    </div>
    <div class="output-body">
      <div class="placeholder" id="placeholder">
        <div class="icon">🔍</div>
        <p>Paste or upload code<br>then hit Review</p>
      </div>
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <p id="loadingText">Analyzing your code...</p>
      </div>
      <div class="results hidden" id="results"></div>
    </div>
  </div>

</div>

<script>
let selectedLang = 'python';

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedLang = btn.dataset.lang;
    const ext = {python:'py',javascript:'js',typescript:'ts',java:'java',go:'go',cpp:'cpp',rust:'rs',php:'php'};
    document.getElementById('editorTitle').textContent = `editor.${ext[selectedLang]||selectedLang}`;
  });
});

function selectAgent(btn) {
  if (btn.dataset.agent !== 'gemini') return;
  document.querySelectorAll('.agent-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    document.getElementById('codeInput').value = ev.target.result;
    updateCount();
    const ext = file.name.split('.').pop();
    const map = {py:'python',js:'javascript',ts:'typescript',java:'java',go:'go',cpp:'cpp',c:'cpp',rs:'rust',php:'php'};
    if (map[ext]) {
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === map[ext]));
      selectedLang = map[ext];
      const extMap = {python:'py',javascript:'js',typescript:'ts',java:'java',go:'go',cpp:'cpp',rust:'rs',php:'php'};
      document.getElementById('editorTitle').textContent = `editor.${extMap[selectedLang]||selectedLang}`;
    }
    const fn = document.getElementById('fileName');
    fn.textContent = file.name;
    fn.classList.remove('hidden');
  };
  reader.readAsText(file);
}

const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file) handleFile({ target: { files: [file] } });
});

function updateCount() {
  document.getElementById('charCount').textContent = `${document.getElementById('codeInput').value.length} chars`;
}

function clearCode() {
  document.getElementById('codeInput').value = '';
  updateCount();
  document.getElementById('fileName').classList.add('hidden');
  document.getElementById('placeholder').classList.remove('hidden');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
}

async function reviewCode() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) return;

  const btn = document.getElementById('reviewBtn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  document.getElementById('placeholder').classList.add('hidden');
  document.getElementById('results').classList.add('hidden');
  document.getElementById('loading').classList.remove('hidden');

  const msgs = ['Parsing code structure...','Detecting issues...','Generating fixes...','Almost done...'];
  let i = 0;
  const interval = setInterval(() => {
    document.getElementById('loadingText').textContent = msgs[i++ % msgs.length];
  }, 1200);

  try {
    const res = await fetch('http://127.0.0.1:8000/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, language: selectedLang })
    });
    const data = await res.json();
    clearInterval(interval);
    document.getElementById('loading').classList.add('hidden');
    const resultsEl = document.getElementById('results');
    resultsEl.classList.remove('hidden');
    resultsEl.innerHTML = renderResults(data.review);
  } catch (err) {
    clearInterval(interval);
    document.getElementById('loading').classList.add('hidden');
    const resultsEl = document.getElementById('results');
    resultsEl.classList.remove('hidden');
    resultsEl.innerHTML = `<div class="error-block">⚠️ Cannot connect to API. Make sure server is running on port 8000.</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '⚡ Review';
}

function renderResults(review) {
  if (!review || review.raw) return `<div class="error-block">${review?.raw || 'Unexpected response'}</div>`;

  const score = review.score || '?';
  const summary = review.summary || '';
  const issues = review.issues || [];
  const refactored = review.refactored_code || '';

  let html = `
    <div class="score-block">
      <div>
        <div class="score-num">${score}</div>
        <div class="score-sub">/ 10</div>
      </div>
      <div class="score-summary">${summary}</div>
    </div>
  `;

  if (issues.length > 0) {
    html += `<div class="section-label">${issues.length} issue${issues.length !== 1 ? 's' : ''} found</div>`;
    issues.forEach(issue => {
      const sev = (issue.severity || 'suggestion').toLowerCase();
      html += `
        <div class="issue-card ${sev}">
          <div class="issue-top">
            <span class="sev-tag ${sev}">${sev}</span>
            <span class="line-ref">line ${issue.line || 'general'}</span>
          </div>
          <div class="issue-text">${issue.issue}</div>
          <div class="divider"></div>
          <div class="why-text"><span class="fix-label">💡 Why:</span> ${issue.why || 'N/A'}</div>
          <div class="quick-fix"><span class="fix-label">⚡ Quick fix:</span> ${issue.quick_fix || 'N/A'}</div>
          <div class="best-fix"><span class="fix-label">🏆 Best fix:</span> ${issue.best_fix || 'N/A'}</div>
        </div>
      `;
    });
  } else {
    html += `<div class="issue-card suggestion"><div class="issue-text">✅ No major issues found!</div></div>`;
  }

  if (refactored) {
    html += `
      <div class="section-label">Refactored Code</div>
      <div class="code-block-wrap">
        <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        <div class="code-block">${escapeHtml(refactored)}</div>
      </div>
    `;
  }
  return html;
}

function copyCode(btn) {
  const code = btn.nextElementSibling.textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
